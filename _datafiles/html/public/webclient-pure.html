<!DOCTYPE html>
<html>
<head>
    <title>{{ .CONFIG.Server.MudName }} Web Terminal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'DejaVu Sans Mono', monospace;
            display: flex;
            flex-direction: column;
            background-color: #1e1e1e;
            position: relative;
        }

        #main-container {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            background-color: #000;
        }

        #terminal {
            flex: 1;
            min-width: 0;
            position: relative;
        }

        #input-area {
            display: flex;
            padding: 10px;
            background-color: #1e1e1e;
        }

        #command-input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: none;
            background-color: #333;
            color: white;
            border-radius: 0px 5px 5px 0px;
        }

        #command-input:focus {
            outline: none;
        }

        #connect-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            padding: 20px 40px;
            font-size: 20px;
            background-color: #555;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            animation: pulse 1s infinite alternate;
        }

        #connect-button:disabled {
            color: #888;
            pointer-events: none;
            animation: none;
            background-color: #555;
            cursor: not-allowed;
        }

        @keyframes pulse {
            0%   { background-color: #555; color: white; }
            100% { color: #d17a7a; background-color: #9f4a4a; }
        }

        #menu-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 20px;
            color: white;
            padding: 8px 10px;
            cursor: pointer;
            z-index: 9999;
            background-color: rgba(30, 30, 30, 0.8);
            border-radius: 5px;
            line-height: 1;
        }

        /* Modal backdrop */
        #settings-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        #settings-backdrop.open {
            display: flex;
        }

        /* Modal panel */
        #floating-menu {
            position: relative;
            width: 520px;
            max-width: 94vw;
            max-height: 80vh;
            background-color: #1e1e1e;
            border: 1px solid #1c6b60;
            border-radius: 8px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Modal header */
        #settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px 0;
            flex-shrink: 0;
        }

        #settings-title {
            color: #dffbd1;
            font-size: 13px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        #settings-close {
            color: #7ab8a0;
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: Arial, sans-serif;
        }

        #settings-close:hover {
            color: #dffbd1;
            background: #0d2e28;
        }

        /* Tab bar */
        #settings-tab-bar {
            display: flex;
            flex-shrink: 0;
            border-bottom: 1px solid #0f3333;
            padding: 0 16px;
            margin-top: 10px;
        }

        .settings-tab-btn {
            padding: 6px 14px;
            background: none;
            border: none;
            cursor: pointer;
            font: inherit;
            font-size: 12px;
            font-family: Arial, sans-serif;
            color: #7ab8a0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color 0.15s;
        }

        .settings-tab-btn:hover {
            color: #dffbd1;
        }

        .settings-tab-btn.active {
            color: #dffbd1;
            border-bottom-color: #3ad4b8;
        }

        /* Tab panels */
        #settings-tab-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        #settings-tab-body::-webkit-scrollbar       { width: 4px; }
        #settings-tab-body::-webkit-scrollbar-track  { background: #111; }
        #settings-tab-body::-webkit-scrollbar-thumb  { background: #1c6b60; border-radius: 2px; }

        .settings-tab-panel {
            display: none;
        }

        .settings-tab-panel.active {
            display: block;
        }

        .settings-section {
            padding: 0;
        }

        .settings-section + .settings-section {
            border-top: none;
            margin-top: 16px;
        }

        .settings-section-title {
            color: #7ab8a0;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
            font-family: Arial, sans-serif;
            border-bottom: 1px solid #0f3333;
            padding-bottom: 5px;
        }

        .slider-container {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .slider-container label {
            color: #ccc;
            width: 130px;
            font-size: 13px;
            font-family: Arial, sans-serif;
        }

        .slider-container input[type="range"] {
            flex: 1;
            margin: 0 8px;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            border-radius: 2px;
            background: #555;
            outline: none;
            cursor: pointer;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #1c6b60;
            cursor: pointer;
            border: 2px solid #3ad4b8;
            transition: background 0.15s;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #1c6b60;
            cursor: pointer;
            border: 2px solid #3ad4b8;
            transition: background 0.15s;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            background: #3ad4b8;
        }

        .slider-container input[type="range"]::-moz-range-thumb:hover {
            background: #3ad4b8;
        }

        .slider-icon {
            width: 24px;
            text-align: center;
            font-size: 16px;
            color: #ccc;
        }

        #mute-container {
            margin-bottom: 10px;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-family: Arial, sans-serif;
        }

        #mute-container label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Toggle switch */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 18px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .toggle-track {
            position: absolute;
            inset: 0;
            background: #555;
            border-radius: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle-switch input:checked + .toggle-track {
            background: #1c6b60;
        }

        .toggle-switch input:checked + .toggle-track::after {
            transform: translateX(14px);
        }

        /* Reset layout button */
        #reset-layout-btn {
            margin-top: 14px;
            padding: 7px 14px;
            background: #0d2e28;
            border: 1px solid #1c6b60;
            border-radius: 4px;
            color: #7ab8a0;
            font-size: 12px;
            font-family: Arial, sans-serif;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: background 0.15s, color 0.15s;
        }

        #reset-layout-btn:hover {
            background: #1c6b60;
            color: #dffbd1;
        }

        /* Window toggle rows */
        .win-toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            color: #ccc;
            font-size: 13px;
            font-family: Arial, sans-serif;
        }

        .win-toggle-row + .win-toggle-row {
            border-top: 1px solid #383838;
        }

        /* Trigger list */
        #trigger-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }

        .trigger-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 6px;
            background: #0d2e28;
            border: 1px solid #0f3333;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .trigger-row:hover {
            background: #133a32;
        }

        .trigger-row.selected {
            border-color: #3ad4b8;
            background: #0f3f36;
        }

        .trigger-row-pattern {
            flex: 1;
            font-family: monospace;
            font-size: 12px;
            color: #dffbd1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .trigger-row-badge {
            font-size: 10px;
            font-family: Arial, sans-serif;
            color: #7ab8a0;
            background: #0a2420;
            border: 1px solid #0f3333;
            border-radius: 3px;
            padding: 1px 5px;
            flex-shrink: 0;
        }

        .trigger-delete-btn {
            background: none;
            border: none;
            color: #7ab8a0;
            font-size: 14px;
            cursor: pointer;
            padding: 0 2px;
            line-height: 1;
            flex-shrink: 0;
        }

        .trigger-delete-btn:hover {
            color: #e06060;
        }

        /* Trigger editor */
        #trigger-editor {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
            padding: 10px;
            background: #0d2e28;
            border: 1px solid #1c6b60;
            border-radius: 4px;
        }

        #trigger-editor.visible {
            display: flex;
        }

        #trigger-editor label {
            color: #7ab8a0;
            font-size: 11px;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #trigger-pattern-input {
            width: 100%;
            padding: 5px 7px;
            background: #111;
            border: 1px solid #1c6b60;
            border-radius: 3px;
            color: #dffbd1;
            font-family: monospace;
            font-size: 12px;
            outline: none;
        }

        #trigger-pattern-input:focus {
            border-color: #3ad4b8;
        }

        #trigger-body-input {
            width: 100%;
            min-height: 100px;
            padding: 6px 7px;
            background: #111;
            border: 1px solid #1c6b60;
            border-radius: 3px;
            color: #dffbd1;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
            outline: none;
            line-height: 1.5;
        }

        #trigger-body-input:focus {
            border-color: #3ad4b8;
        }

        #trigger-error {
            color: #e06060;
            font-size: 11px;
            font-family: monospace;
            display: none;
        }

        #trigger-error.visible {
            display: block;
        }

        .trigger-editor-actions {
            display: flex;
            gap: 8px;
        }

        .trigger-btn {
            padding: 5px 12px;
            background: #0d2e28;
            border: 1px solid #1c6b60;
            border-radius: 4px;
            color: #7ab8a0;
            font-size: 12px;
            font-family: Arial, sans-serif;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: background 0.15s, color 0.15s;
        }

        .trigger-btn:hover {
            background: #1c6b60;
            color: #dffbd1;
        }

        .trigger-btn.primary {
            border-color: #3ad4b8;
            color: #3ad4b8;
        }

        .trigger-btn.primary:hover {
            background: #1c6b60;
            color: #dffbd1;
        }

        #add-trigger-btn {
            margin-top: 2px;
        }

        /* FX picker */
        .trigger-fx-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .trigger-fx-group-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 6px;
            cursor: pointer;
            user-select: none;
            border-radius: 3px;
        }

        .trigger-fx-group-header:hover {
            background: #0d2e28;
        }

        .trigger-fx-group-arrow {
            font-size: 8px;
            color: #3ad4b8;
            width: 10px;
            text-align: center;
            flex-shrink: 0;
        }

        .trigger-fx-group-name {
            font-size: 10px;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #7ab8a0;
            flex: 1;
        }

        .trigger-fx-group-count {
            font-size: 10px;
            font-family: Arial, sans-serif;
            color: #3ad4b8;
        }

        .trigger-fx-group-items {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding-left: 10px;
            margin-bottom: 4px;
        }

        .trigger-fx-group-items.collapsed {
            display: none;
        }

        .trigger-fx-item {
            background: #0a1e1a;
            border: 1px solid #0f3333;
            border-radius: 4px;
            overflow: hidden;
            transition: border-color 0.15s;
        }

        .trigger-fx-item.active {
            border-color: #1c6b60;
        }

        .trigger-fx-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 8px;
            cursor: default;
        }

        .trigger-fx-preview-btn {
            background: none;
            border: 1px solid #1c6b60;
            border-radius: 3px;
            color: #7ab8a0;
            font-size: 10px;
            font-family: Arial, sans-serif;
            padding: 1px 7px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
        }

        .trigger-fx-preview-btn:hover {
            background: #1c6b60;
            color: #dffbd1;
        }

        .trigger-fx-name {
            flex: 1;
            font-family: monospace;
            font-size: 12px;
            color: #7ab8a0;
            transition: color 0.15s;
        }

        .trigger-fx-item.active .trigger-fx-name {
            color: #dffbd1;
        }

        .trigger-fx-params {
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            padding: 6px 8px 8px 40px;
            border-top: 1px solid #0f3333;
        }

        .trigger-fx-item.active .trigger-fx-params {
            display: flex;
        }

        .fx-param-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 90px;
        }

        .fx-param-group label {
            color: #7ab8a0;
            font-size: 10px;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .fx-param-input {
            padding: 4px 6px;
            background: #111;
            border: 1px solid #1c6b60;
            border-radius: 3px;
            color: #dffbd1;
            font-family: monospace;
            font-size: 12px;
            outline: none;
            width: 100%;
        }

        .fx-param-input[type="color"] {
            padding: 2px 4px;
            height: 28px;
            cursor: pointer;
        }

        .fx-param-input:focus {
            border-color: #3ad4b8;
        }

        /* Trigger IO section */
        .trigger-io-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 2px;
        }

        .trigger-io-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        #trigger-io-area {
            width: 100%;
            min-height: 80px;
            padding: 6px 7px;
            background: #111;
            border: 1px solid #1c6b60;
            border-radius: 3px;
            color: #dffbd1;
            font-family: monospace;
            font-size: 11px;
            resize: vertical;
            outline: none;
            line-height: 1.4;
            display: none;
        }

        #trigger-io-area.visible {
            display: block;
        }

        #trigger-io-area:focus {
            border-color: #3ad4b8;
        }

        #trigger-io-error {
            color: #e06060;
            font-size: 11px;
            font-family: monospace;
            margin-top: 4px;
            display: none;
        }

        #trigger-io-error.visible {
            display: block;
        }

        /* Stats tab */
        .stats-uptime {
            font-size: 11px;
            font-family: Arial, sans-serif;
            color: #3ad4b8;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #0f3333;
        }

        .stats-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 11px;
            border-bottom: 1px solid #0a1a16;
        }
        .stats-row:last-child { border-bottom: none; }

        .stats-row-label {
            color: #7ab8a0;
            font-family: Arial, sans-serif;
            flex: 1;
        }

        .stats-row-right {
            display: flex;
            gap: 16px;
        }

        .stats-row-value {
            color: #dffbd1;
            font-family: monospace;
            font-variant-numeric: tabular-nums;
            text-align: right;
            min-width: 7em;
        }

        .stats-row-rate {
            color: #7ab8a0;
            font-family: monospace;
            font-variant-numeric: tabular-nums;
            text-align: right;
            min-width: 7em;
        }

        .stats-gmcp-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 4px 0 3px;
            font-size: 11px;
            font-family: Arial, sans-serif;
            color: #7ab8a0;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid #0f3333;
        }
        .stats-gmcp-header:hover { color: #dffbd1; }

        .stats-gmcp-toggle {
            font-size: 9px;
            color: #3ad4b8;
            margin-right: 4px;
        }

        .stats-gmcp-total {
            color: #dffbd1;
            font-family: monospace;
            font-variant-numeric: tabular-nums;
            text-align: right;
            min-width: 7em;
        }

        .stats-gmcp-rows {
            display: none;
            flex-direction: column;
            padding-left: 10px;
        }
        .stats-gmcp-rows.open { display: flex; }

        .stats-ns-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 11px;
            border-bottom: 1px solid #0a1a16;
            cursor: pointer;
            user-select: none;
        }
        .stats-ns-row:last-of-type { border-bottom: none; }
        .stats-ns-row:hover .stats-row-label { color: #dffbd1; }

        .stats-ns-count {
            color: #7ab8a0;
            font-family: Arial, sans-serif;
            font-size: 10px;
            margin-left: 3px;
        }

        .stats-ns-payload {
            display: none;
            margin: 2px 0 4px 14px;
            padding: 6px 8px;
            background: #0a1a16;
            border-left: 2px solid #1c6b60;
            font-family: monospace;
            font-size: 11px;
            color: #dffbd1;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
        }
        .stats-ns-payload.open { display: block; }
    </style>

    <link rel="stylesheet" href="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/css/xterm.css" />
    <link rel="stylesheet" href="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/css/windows.css" />

    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/xterm.4.19.0.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/xterm-addon-fit.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/mp3.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/fx.js?v=2"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/winbox.bundle.min.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/webclient-core.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/triggers.js"></script>
    <!-- Left dock -->
     <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-gametime.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-character.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-gear.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-vitals.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-status.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-party.js"></script>
    <!-- Right dock -->
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-map.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-room.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-online.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-killstats.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-comm.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-modal.js"></script>
    
    
</head>
<body onload="init()">

    <div id="main-container">
        <div id="dock-left"></div>
        <div id="terminal">
            <div id="menu-icon" onclick="toggleMenu()">&#9881;</div>
        </div>
        <div id="dock-right"></div>
    </div>

    <div id="settings-backdrop">
        <div id="floating-menu">
            <div id="settings-header">
                <span id="settings-title">Settings</span>
                <span id="settings-close" onclick="toggleMenu()">&#x2715;</span>
            </div>
            <div id="settings-tab-bar">
                <button class="settings-tab-btn active" data-tab="tab-volume">Volume</button>
                <button class="settings-tab-btn" data-tab="tab-windows">Windows</button>
                <button class="settings-tab-btn" data-tab="tab-triggers">Triggers</button>
                <button class="settings-tab-btn" data-tab="tab-stats">Stats</button>
            </div>
            <div id="settings-tab-body">
                <div class="settings-tab-panel active" id="tab-volume">
                    <div class="settings-section">
                        <div class="settings-section-title">Volume Controls</div>
                        <div id="mute-container">
                            <label>
                                <span class="toggle-switch">
                                    <input type="checkbox" id="mute-checkbox" onchange="toggleMuteAll()">
                                    <span class="toggle-track"></span>
                                </span>
                                <span id="mute-icon">&#128266;</span> Mute All Sound
                            </label>
                        </div>
                        <div id="sliders-container"></div>
                    </div>
                </div>
                <div class="settings-tab-panel" id="tab-windows">
                    <div class="settings-section">
                        <div class="settings-section-title">Windows</div>
                        <div id="windows-container"></div>
                    </div>
                    <button id="reset-layout-btn" onclick="resetLayout()">Reset Layout</button>
                </div>
                <div class="settings-tab-panel" id="tab-triggers">
                    <div class="settings-section">
                        <div class="settings-section-title">Triggers</div>
                        <div id="trigger-list"></div>
                        <div id="trigger-editor">
                            <label for="trigger-pattern-input">Pattern</label>
                            <input type="text" id="trigger-pattern-input" placeholder="e.g. You receive {number} gold." spellcheck="false">
                            <label for="trigger-body-input">Function body <span style="color:#555;text-transform:none;letter-spacing:0">(receives: matches)</span></label>
                            <textarea id="trigger-body-input" spellcheck="false"></textarea>
                            <label>Visual Effects</label>
                            <div id="trigger-fx-list" class="trigger-fx-list"></div>
                            <div id="trigger-error"></div>
                            <div class="trigger-editor-actions">
                                <button class="trigger-btn primary" id="trigger-save-btn">Save</button>
                                <button class="trigger-btn" id="trigger-cancel-btn">Cancel</button>
                            </div>
                        </div>
                        <div class="trigger-io-row">
                            <button class="trigger-btn" id="add-trigger-btn">+ Add Trigger</button>
                            <button class="trigger-btn" id="trigger-enable-all-btn">Enable All</button>
                            <button class="trigger-btn" id="trigger-disable-all-btn">Disable All</button>
                        </div>
                    </div>
                    <div class="settings-section" id="trigger-io-section">
                        <div class="settings-section-title">Import / Export</div>
                        <div class="trigger-io-actions">
                            <button class="trigger-btn" id="trigger-export-btn">Export JSON</button>
                            <button class="trigger-btn" id="trigger-import-btn">Import JSON</button>
                        </div>
                        <textarea id="trigger-io-area" spellcheck="false" placeholder="Paste exported JSON here to import..."></textarea>
                        <div id="trigger-io-error"></div>
                    </div>
                </div>
                <div class="settings-tab-panel" id="tab-stats">
                    <div class="settings-section">
                        <div class="settings-section-title">Network</div>
                        <div id="stats-net-overall"></div>
                        <div id="stats-net-gmcp" style="margin-top:8px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button id="connect-button">Connect to {{ .CONFIG.Server.MudName }}</button>

    <div id="input-area">
        <input type="text" id="command-input" placeholder="Enter command...">
    </div>

    <script>
        // Bridge HTML attribute event handlers to the Client namespace.
        // HTML onload/onclick attributes require globally-scoped functions.
        function init()          { Client.init(); }
        function toggleMenu()    { Client.toggleMenu(); }
        function toggleMuteAll() { Client.toggleMuteAll(); }
        function resetLayout()   { Client.resetLayout(); }

        // Tab switching for the settings modal
        document.addEventListener('DOMContentLoaded', function() {
            var tabBar = document.getElementById('settings-tab-bar');
            tabBar.addEventListener('click', function(e) {
                var btn = e.target.closest('.settings-tab-btn');
                if (!btn) { return; }
                tabBar.querySelectorAll('.settings-tab-btn').forEach(function(b) {
                    b.classList.remove('active');
                });
                document.querySelectorAll('.settings-tab-panel').forEach(function(p) {
                    p.classList.remove('active');
                });
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });

            // Close modal when clicking the backdrop outside the panel
            document.getElementById('settings-backdrop').addEventListener('click', function(e) {
                if (e.target === this) { Client.toggleMenu(); }
            });

            // ---------------------------------------------------------------
            // Triggers tab
            // ---------------------------------------------------------------
            var _editingIdx = -1; // -1 = new trigger

            function renderTriggerList() {
                var list = document.getElementById('trigger-list');
                list.innerHTML = '';
                Triggers.getTriggers().forEach(function(t, idx) {
                    var row = document.createElement('div');
                    row.className = 'trigger-row';
                    row.dataset.idx = idx;

                    var toggle = document.createElement('label');
                    toggle.className = 'toggle-switch';
                    toggle.title = t.enabled ? 'Enabled' : 'Disabled';
                    var chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.checked = t.enabled;
                    chk.addEventListener('change', function(e) {
                        e.stopPropagation();
                        Triggers.setEnabled(idx, chk.checked);
                        toggle.title = chk.checked ? 'Enabled' : 'Disabled';
                    });
                    var track = document.createElement('span');
                    track.className = 'toggle-track';
                    toggle.appendChild(chk);
                    toggle.appendChild(track);

                    var pattern = document.createElement('span');
                    pattern.className = 'trigger-row-pattern';
                    pattern.textContent = t.pattern;

                    row.appendChild(toggle);
                    row.appendChild(pattern);

                    if (t.isDefault) {
                        var badge = document.createElement('span');
                        badge.className = 'trigger-row-badge';
                        badge.textContent = 'default';
                        row.appendChild(badge);
                    }

                    if (t.fx) {
                        var fxNames = Object.keys(t.fx);
                        var show    = fxNames.slice(0, 2);
                        show.forEach(function(fxName) {
                            var fxBadge = document.createElement('span');
                            fxBadge.className = 'trigger-row-badge';
                            fxBadge.style.color = '#3ad4b8';
                            fxBadge.style.borderColor = '#1c6b60';
                            fxBadge.textContent = fxName;
                            row.appendChild(fxBadge);
                        });
                        if (fxNames.length > 2) {
                            var moreBadge = document.createElement('span');
                            moreBadge.className = 'trigger-row-badge';
                            moreBadge.style.color = '#3ad4b8';
                            moreBadge.style.borderColor = '#1c6b60';
                            moreBadge.textContent = '+' + (fxNames.length - 2) + ' more';
                            row.appendChild(moreBadge);
                        }
                    }

                    if (!t.isDefault) {
                        var del = document.createElement('button');
                        del.className = 'trigger-delete-btn';
                        del.title = 'Delete';
                        del.textContent = '\u2715';
                        del.addEventListener('click', function(e) {
                            e.stopPropagation();
                            if (_editingIdx === idx) { closeEditor(); }
                            else if (_editingIdx > idx) { _editingIdx--; }
                            Triggers.removeTrigger(idx);
                            renderTriggerList();
                        });
                        row.appendChild(del);
                    }

                    row.addEventListener('click', function(e) {
                        if (e.target.closest('.toggle-switch') || e.target.closest('.trigger-delete-btn')) { return; }
                        openEditor(idx);
                        document.querySelectorAll('.trigger-row').forEach(function(r) { r.classList.remove('selected'); });
                        row.classList.add('selected');
                    });

                    list.appendChild(row);
                });
            }

            // Build the grouped, collapsible FX editor.
            // savedFX: { [fxName]: { [paramKey]: value } } or null
            // _fxGroupOpen tracks which groups are expanded; persists across open/close.
            var _fxGroupOpen = {};

            function renderFXEditor(savedFX) {
                var container = document.getElementById('trigger-fx-list');
                if (!container) { return; }
                container.innerHTML = '';

                // Collect groups in order
                var groups = [];
                var groupMap = {};
                Triggers.FX_DEFS.forEach(function(def) {
                    if (!groupMap[def.group]) {
                        groupMap[def.group] = [];
                        groups.push(def.group);
                    }
                    groupMap[def.group].push(def);
                });

                groups.forEach(function(groupName) {
                    var defs        = groupMap[groupName];
                    var activeCount = defs.filter(function(d) { return savedFX && savedFX[d.name]; }).length;

                    // Default: open groups that have active items only
                    if (_fxGroupOpen[groupName] === undefined) {
                        _fxGroupOpen[groupName] = activeCount > 0;
                    }
                    var open = _fxGroupOpen[groupName];

                    // Group header
                    var header = document.createElement('div');
                    header.className = 'trigger-fx-group-header';

                    var arrow = document.createElement('span');
                    arrow.className = 'trigger-fx-group-arrow';
                    arrow.textContent = open ? '\u25bc' : '\u25b6';

                    var nameSpan = document.createElement('span');
                    nameSpan.className = 'trigger-fx-group-name';
                    nameSpan.textContent = groupName;

                    var countSpan = document.createElement('span');
                    countSpan.className = 'trigger-fx-group-count';
                    if (activeCount > 0) { countSpan.textContent = activeCount + ' on'; }

                    header.appendChild(arrow);
                    header.appendChild(nameSpan);
                    header.appendChild(countSpan);
                    container.appendChild(header);

                    // Group items
                    var itemsDiv = document.createElement('div');
                    itemsDiv.className = 'trigger-fx-group-items' + (open ? '' : ' collapsed');

                    defs.forEach(function(def) {
                        var saved   = savedFX && savedFX[def.name];
                        var enabled = !!saved;

                        var item = document.createElement('div');
                        item.className = 'trigger-fx-item' + (enabled ? ' active' : '');
                        item.dataset.fx = def.name;

                        var itemHeader = document.createElement('div');
                        itemHeader.className = 'trigger-fx-header';

                        var toggleLabel = document.createElement('label');
                        toggleLabel.className = 'toggle-switch';
                        var chk = document.createElement('input');
                        chk.type = 'checkbox';
                        chk.checked = enabled;
                        var track = document.createElement('span');
                        track.className = 'toggle-track';
                        toggleLabel.appendChild(chk);
                        toggleLabel.appendChild(track);

                        var fxNameSpan = document.createElement('span');
                        fxNameSpan.className = 'trigger-fx-name';
                        fxNameSpan.textContent = def.name;

                        var paramsDiv = document.createElement('div');
                        paramsDiv.className = 'trigger-fx-params';
                        def.params.forEach(function(p) {
                            var group = document.createElement('div');
                            group.className = 'fx-param-group';
                            var lbl = document.createElement('label');
                            lbl.textContent = p.label;
                            var inp = document.createElement('input');
                            inp.className = 'fx-param-input';
                            inp.type = p.type === 'color' ? 'color' : 'number';
                            inp.dataset.key = p.key;
                            inp.dataset.paramType = p.type;
                            if (p.type === 'number') { inp.step = 'any'; inp.min = '0'; }
                            inp.value = (saved && saved[p.key] !== undefined) ? saved[p.key] : p.default;
                            group.appendChild(lbl);
                            group.appendChild(inp);
                            paramsDiv.appendChild(group);
                        });

                        var previewBtn = document.createElement('button');
                        previewBtn.className = 'trigger-fx-preview-btn';
                        previewBtn.textContent = 'Preview';
                        previewBtn.addEventListener('click', function() {
                            if (typeof window.FX !== 'object' || typeof window.FX[def.name] !== 'function') { return; }
                            var args = def.params.map(function(p) {
                                var inp = paramsDiv.querySelector('[data-key="' + p.key + '"]');
                                var v   = inp ? inp.value : p.default;
                                return p.type === 'number' ? Number(v) : v;
                            });
                            window.FX[def.name].apply(null, args);
                        });

                        itemHeader.appendChild(toggleLabel);
                        itemHeader.appendChild(fxNameSpan);
                        itemHeader.appendChild(previewBtn);
                        item.appendChild(itemHeader);
                        item.appendChild(paramsDiv);

                        chk.addEventListener('change', function() {
                            item.classList.toggle('active', chk.checked);
                            // Update the group active count badge
                            var on = itemsDiv.querySelectorAll('.trigger-fx-item.active').length;
                            countSpan.textContent = on > 0 ? on + ' on' : '';
                        });

                        itemsDiv.appendChild(item);
                    });

                    header.addEventListener('click', function() {
                        var isCollapsed = itemsDiv.classList.toggle('collapsed');
                        _fxGroupOpen[groupName] = !isCollapsed;
                        arrow.textContent = isCollapsed ? '\u25b6' : '\u25bc';
                    });

                    container.appendChild(itemsDiv);
                });
            }

            // Collect FX map from editor. Returns null if nothing enabled.
            function collectFX() {
                var result = null;
                document.querySelectorAll('#trigger-fx-list .trigger-fx-item').forEach(function(item) {
                    var chk = item.querySelector('input[type="checkbox"]');
                    if (!chk || !chk.checked) { return; }
                    var fxName = item.dataset.fx;
                    var params = {};
                    item.querySelectorAll('.fx-param-input').forEach(function(inp) {
                        params[inp.dataset.key] = inp.dataset.paramType === 'number' ? Number(inp.value) : inp.value;
                    });
                    if (!result) { result = {}; }
                    result[fxName] = params;
                });
                return result;
            }

            function openEditor(idx) {
                var triggers = Triggers.getTriggers();
                _editingIdx = idx;
                var t = triggers[idx];
                document.getElementById('trigger-pattern-input').value = t.pattern;
                document.getElementById('trigger-body-input').value = t.body;
                renderFXEditor(t.fx || null);
                document.getElementById('trigger-error').textContent = '';
                document.getElementById('trigger-error').classList.remove('visible');
                document.getElementById('trigger-editor').classList.add('visible');
                document.getElementById('add-trigger-btn').style.display = 'none';
            }

            function openNewEditor() {
                _editingIdx = -1;
                document.getElementById('trigger-pattern-input').value = '';
                document.getElementById('trigger-body-input').value = '';
                renderFXEditor(null);
                document.getElementById('trigger-error').textContent = '';
                document.getElementById('trigger-error').classList.remove('visible');
                document.getElementById('trigger-editor').classList.add('visible');
                document.getElementById('add-trigger-btn').style.display = 'none';
                document.querySelectorAll('.trigger-row').forEach(function(r) { r.classList.remove('selected'); });
                document.getElementById('trigger-pattern-input').focus();
            }

            function closeEditor() {
                _editingIdx = -1;
                document.getElementById('trigger-editor').classList.remove('visible');
                document.getElementById('trigger-error').classList.remove('visible');
                document.getElementById('add-trigger-btn').style.display = '';
                document.querySelectorAll('.trigger-row').forEach(function(r) { r.classList.remove('selected'); });
            }

            document.getElementById('trigger-save-btn').addEventListener('click', function() {
                var pattern = document.getElementById('trigger-pattern-input').value.trim();
                var body    = document.getElementById('trigger-body-input').value;
                var fx      = collectFX();
                var errEl   = document.getElementById('trigger-error');

                var err;
                if (_editingIdx === -1) {
                    err = Triggers.addTrigger(pattern, body, fx);
                } else {
                    err = Triggers.saveTrigger(_editingIdx, pattern, body, fx);
                }

                if (err) {
                    errEl.textContent = err;
                    errEl.classList.add('visible');
                    return;
                }

                closeEditor();
                renderTriggerList();
            });

            document.getElementById('trigger-cancel-btn').addEventListener('click', function() {
                closeEditor();
            });

            document.getElementById('add-trigger-btn').addEventListener('click', function() {
                openNewEditor();
            });

            // Enable All / Disable All
            document.getElementById('trigger-enable-all-btn').addEventListener('click', function() {
                Triggers.setAllEnabled(true);
                renderTriggerList();
            });

            document.getElementById('trigger-disable-all-btn').addEventListener('click', function() {
                Triggers.setAllEnabled(false);
                renderTriggerList();
            });

            // Export
            document.getElementById('trigger-export-btn').addEventListener('click', function() {
                var area   = document.getElementById('trigger-io-area');
                var errEl  = document.getElementById('trigger-io-error');
                area.value = Triggers.exportTriggers();
                area.classList.add('visible');
                errEl.classList.remove('visible');
                area.select();
            });

            // Import
            document.getElementById('trigger-import-btn').addEventListener('click', function() {
                var area  = document.getElementById('trigger-io-area');
                var errEl = document.getElementById('trigger-io-error');
                var isVisible = area.classList.contains('visible');

                if (!isVisible) {
                    area.value = '';
                    area.classList.add('visible');
                    errEl.classList.remove('visible');
                    area.focus();
                    document.getElementById('trigger-import-btn').textContent = 'Apply Import';
                    return;
                }

                var json = area.value.trim();
                if (!json) {
                    area.classList.remove('visible');
                    errEl.classList.remove('visible');
                    document.getElementById('trigger-import-btn').textContent = 'Import JSON';
                    return;
                }

                var err = Triggers.importTriggers(json);
                if (err) {
                    errEl.textContent = err;
                    errEl.classList.add('visible');
                    return;
                }

                area.value = '';
                area.classList.remove('visible');
                errEl.classList.remove('visible');
                document.getElementById('trigger-import-btn').textContent = 'Import JSON';
                renderTriggerList();
            });

            // Hide IO area when switching away from Triggers tab
            // (handled in the tab-click listener below)

            // Restart the stats interval if the modal is reopened with Stats already active.
            var observer = new MutationObserver(function() {
                var backdrop = document.getElementById('settings-backdrop');
                var isOpen   = backdrop.classList.contains('open');
                var statsTab = document.getElementById('tab-stats');
                if (isOpen && statsTab && statsTab.classList.contains('active')) {
                    renderStats();
                    if (!_statsInterval) {
                        _statsInterval = setInterval(renderStats, 500);
                    }
                } else if (!isOpen) {
                    if (_statsInterval) { clearInterval(_statsInterval); _statsInterval = null; }
                }
            });
            observer.observe(document.getElementById('settings-backdrop'), { attributes: true, attributeFilter: ['class'] });

            // Re-render the trigger list each time the Triggers tab is activated.
            // Start/stop the stats live-update when the Stats tab is activated.
            tabBar.addEventListener('click', function(e) {
                var btn = e.target.closest('.settings-tab-btn');
                if (!btn) { return; }
                if (btn.dataset.tab === 'tab-triggers') {
                    closeEditor();
                    renderTriggerList();
                    // Reset import button label when leaving
                } else {
                    // Leaving triggers: reset import UI
                    var area = document.getElementById('trigger-io-area');
                    if (area) {
                        area.classList.remove('visible');
                        var importBtn = document.getElementById('trigger-import-btn');
                        if (importBtn) { importBtn.textContent = 'Import JSON'; }
                    }
                    var ioErr = document.getElementById('trigger-io-error');
                    if (ioErr) { ioErr.classList.remove('visible'); }
                }
                if (btn.dataset.tab === 'tab-stats') {
                    renderStats();
                    if (!_statsInterval) {
                        _statsInterval = setInterval(renderStats, 500);
                    }
                } else {
                    if (_statsInterval) {
                        clearInterval(_statsInterval);
                        _statsInterval = null;
                    }
                }
            });

            // Stop the stats interval when the settings modal closes.
            document.getElementById('settings-backdrop').addEventListener('click', function(e) {
                if (e.target === this) {
                    if (_statsInterval) { clearInterval(_statsInterval); _statsInterval = null; }
                }
            });
            document.getElementById('settings-close').addEventListener('click', function() {
                if (_statsInterval) { clearInterval(_statsInterval); _statsInterval = null; }
            });
        });

        // -----------------------------------------------------------------------
        // Stats tab
        // -----------------------------------------------------------------------
        var _statsInterval = null;
        var _gmcpOpen      = false;   // is the GMCP In section expanded?
        var _nsOpen        = {};      // which namespace payloads are expanded?

        function _fmtBytes(b) {
            if (b < 1024 * 1024) { return (b / 1024).toFixed(2) + ' KB'; }
            return (b / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function _fmtRate(b, sec) {
            return sec > 0 ? _fmtBytes(b / sec) + '/s' : '—';
        }

        function _fmtUptime(ms) {
            var s = Math.floor(ms / 1000);
            var h = Math.floor(s / 3600);
            var m = Math.floor((s % 3600) / 60);
            var sec = s % 60;
            if (h > 0) { return h + 'h ' + m + 'm ' + sec + 's'; }
            if (m > 0) { return m + 'm ' + sec + 's'; }
            return sec + 's';
        }

        function _gmcpValue(ns) {
            if (typeof Client === 'undefined' || !Client.GMCPStructs) { return undefined; }
            var cur = Client.GMCPStructs;
            var parts = ns.split('.');
            for (var i = 0; i < parts.length; i++) {
                if (cur == null || typeof cur !== 'object') { return undefined; }
                cur = cur[parts[i]];
            }
            return cur;
        }

        function renderStats() {
            if (typeof Client === 'undefined' || !Client.getNetStats) { return; }
            var st  = Client.getNetStats();
            var now = Date.now();
            var ms  = (st.connectTime && st.connectTime > 0) ? (now - st.connectTime) : 0;
            var sec = ms / 1000;

            // --- Overall section ---
            var overall = document.getElementById('stats-net-overall');
            if (overall) {
                overall.innerHTML =
                    '<div class="stats-uptime">Connected for ' + (ms > 0 ? _fmtUptime(ms) : 'not connected') + '</div>' +
                    '<div class="stats-row"><span class="stats-row-label">Sent</span><div class="stats-row-right"><span class="stats-row-value">' + _fmtBytes(st.totalBytesSent) + '</span><span class="stats-row-rate">' + _fmtRate(st.totalBytesSent, sec) + '</span></div></div>' +
                    '<div class="stats-row"><span class="stats-row-label">Received</span><div class="stats-row-right"><span class="stats-row-value">' + _fmtBytes(st.totalBytesReceived) + '</span><span class="stats-row-rate">' + _fmtRate(st.totalBytesReceived, sec) + '</span></div></div>';
            }

            // --- GMCP In section ---
            var gmcpEl = document.getElementById('stats-net-gmcp');
            if (!gmcpEl) { return; }

            var nsList  = Object.keys(st.gmcpInBytes).sort();
            var total   = nsList.reduce(function(s, k) { return s + st.gmcpInBytes[k]; }, 0);

            // Build the whole section as a plain string — no grid, no display:contents.
            // Each row is a simple flex div. Namespace rows get onclick attributes so
            // there is zero ambiguity about what receives the click.
            var h = '';

            h += '<div class="stats-gmcp-header" onclick="_statsToggleGmcp()">';
            h +=   '<span><span class="stats-gmcp-toggle">' + (_gmcpOpen ? '&#9660;' : '&#9654;') + '</span>GMCP In</span>';
            h +=   '<div class="stats-row-right">';
            h +=     '<span class="stats-gmcp-total">' + _fmtBytes(total) + '</span>';
            h +=     '<span class="stats-row-rate">' + _fmtRate(total, sec) + '</span>';
            h +=   '</div>';
            h += '</div>';

            if (_gmcpOpen) {
                h += '<div class="stats-gmcp-rows open">';
                nsList.forEach(function(ns, i) {
                    var bytes   = st.gmcpInBytes[ns];
                    var count   = st.gmcpInCount[ns] || 0;
                    var isOpen  = !!_nsOpen[ns];
                    var safeNs  = ns.replace(/"/g, '&quot;');

                    h += '<div>';
                    h +=   '<div class="stats-ns-row" onclick="_statsToggleNs(&quot;' + safeNs + '&quot;)">';
                    h +=     '<span class="stats-row-label">';
                    h +=       '<span class="stats-gmcp-toggle">' + (isOpen ? '&#9660;' : '&#9654;') + '</span>';
                    h +=       ns + '<span class="stats-ns-count">(' + count + ')</span>';
                    h +=     '</span>';
                    h +=     '<div class="stats-row-right">';
                    h +=       '<span class="stats-row-value">' + _fmtBytes(bytes) + '</span>';
                    h +=       '<span class="stats-row-rate">' + _fmtRate(bytes, sec) + '</span>';
                    h +=     '</div>';
                    h +=   '</div>';

                    if (isOpen) {
                        var val  = _gmcpValue(ns);
                        var text = val !== undefined ? JSON.stringify(val, null, 2) : '(no data)';
                        text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                        h += '<div class="stats-ns-payload open">' + text + '</div>';
                    }

                    h += '</div>';
                });
                h += '</div>';
            }

            gmcpEl.innerHTML = h;
        }

        function _statsToggleGmcp() {
            _gmcpOpen = !_gmcpOpen;
            renderStats();
        }

        function _statsToggleNs(ns) {
            _nsOpen[ns] = !_nsOpen[ns];
            renderStats();
        }

    </script>

</body>
</html>
